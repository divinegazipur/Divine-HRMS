<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Divine Corporation - Staff Profile</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f4; padding: 50px; }
        .container { background: white; padding: 30px; border-radius: 10px; display: inline-block; box-shadow: 0px 0px 10px #ccc; width: 80%; max-width: 500px; }
        h1 { color: #333; }
        .employee { border-bottom: 1px solid #ddd; padding: 20px; }
        .employee h3 { margin: 0; color: #007bff; }
        .employee p { margin: 5px 0; color: #555; }
    </style>
</head>
<body>

<div class="container">
    <h1>Divine Corporation</h1>
    <p>Our Dedicated Team</p>

    <!-- You can add more employee blocks below -->
    <div class="employee">
        <h3>Md. Rahim Uddin</h3>
        <p>Position: Distribution Manager</p>
    </div>

    <div class="employee">
        <h3>Karim Ahmed</h3>
        <p>Position: Sales Officer</p>
    </div>
</div>

</body>
</html>
