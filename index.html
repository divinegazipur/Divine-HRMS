document.getElementById('searchInput').addEventListener('input', function(e) {
    const term = e.target.value.toUpperCase();
    const resultCard = document.getElementById('result-card');
    const resultDiv = document.getElementById('result-content');
    
    if (term.length < 2) {
        resultCard.classList.add('hidden');
        return;
    }

    const found = employees.find(emp => emp.id.includes(term) || emp.name.includes(term));

    if (found) {
        resultCard.classList.remove('hidden');
        resultDiv.innerHTML = `
            <p class="text-sm text-gray-500 uppercase">${found.id}</p>
            <h3 class="text-xl font-bold text-gray-800">${found.name}</h3>
            <p class="text-blue-600 font-semibold">${found.designation}</p>
            <span class="inline-block mt-2 px-3 py-1 text-xs font-bold rounded-full ${found.status === 'Active' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                ${found.status}
            </span>
        `;
    } else {
        resultCard.classList.remove('hidden');
        resultDiv.innerHTML = `<p class="text-red-500">কোনো তথ্য পাওয়া যায়নি!</p>`;
